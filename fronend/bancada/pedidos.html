<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>
<link rel="stylesheet" href="pedidos.css">
</head>

<body>

<div class="topo">
    <h2>Sistema de Pedidos</h2>
    <button class="sair" onclick="window.location.href='bancada.html'">Voltar</button>
</div>

<div class="container">

<div class="card">

<h2>Novo Pedido</h2>

<label>Cliente</label>
<input type="text" id="cliente">

<label>Produto</label>
<input type="text" id="produto">

<label>Quantidade</label>
<input type="number" id="quantidade">

<button class="btn" onclick="adicionarPedido()">Adicionar Pedido</button>

</div>

</div>


<div class="lista-container">

<h2>Lista de Pedidos</h2>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Produto</th>
<th>Quantidade</th>
<th>Ações</th>
</tr>
</thead>

<tbody id="tabelaPedidos">
</tbody>

</table>

</div>

<script src="pedidos.js"></script>

</body>
</html>
